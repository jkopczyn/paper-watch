# RSS newsletters/blogs. Substack feeds follow the reliable <name>.substack.com/feed pattern.
feeds:
  - {name: ML Safety, url: https://newsletter.mlsafety.org/feed}
  - {name: Safe AI (CAIS), url: https://newsletter.safe.ai/feed}
  - {name: AI Safety Frontier, url: https://aisafetyfrontier.substack.com/feed}
  - {name: Daniel Paleka, url: https://dpaleka.substack.com/feed}
  - {name: Transformer, url: https://www.transformernews.ai/feed}
  - {name: Import AI, url: https://jack-clark.net/feed/}
  - {name: Interconnects, url: https://www.interconnects.ai/feed}
  - {name: Davis Blalock, url: https://dblalock.substack.com/feed}
  - {name: Sebastian Raschka, url: https://magazine.sebastianraschka.com/feed}
  # Add once you confirm the feed URL (no reliable pattern):
  # - {name: Epoch Gradient Updates, url: https://epoch.ai/gradient-updates/rss.xml}
  # - {name: OpenAI Blog, url: https://openai.com/blog/rss.xml}

# Twitter handles (AGI Safety Core list). Seed these with:
#   paper-watch seed-handles --from-file handles.txt
# (the list members page needs a logged-in browser; see README).
handles: []

nitter_instances:
  - https://nitter.net
  - https://nitter.poast.org

scoring:
  overlap: 1.0
  velocity: 1.0
  feedback: 1.0
  resurface_boost: 2.0

smtp:
  host: smtp.gmail.com
  port: 587
  username: ja.kopczynski@gmail.com
  from_addr: ja.kopczynski@gmail.com
  to_addr: ja.kopczynski@gmail.com

llm:
  model: claude-haiku-4-5        # or claude-opus-4-8 for higher-quality enrichment
  max_enrich_per_run: 50
