# Ready-to-use paper-watch config, seeded from method-rec.md.
# Copy to config.yaml and edit:  cp config.example.yaml config.yaml
# Secrets (SMTP app password, Anthropic key) live in .env, not here.

db_path: paper_watch.db
top_n: 15
lookback: 7d                     # how far back to fetch when --since isn't given
resurface_window_days: 21        # bring a paper back if attention surges within this window

schedule:                        # local run times the cron installer reads
  - "08:00"
  - "16:00"

