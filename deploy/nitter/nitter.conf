[Server]
hostname = "localhost"       # used only for generating links in feeds
title = "paper-watch nitter"
address = "0.0.0.0"
port = 8080
https = false                # disable to enable cookies when not using https
httpMaxConnections = 100
staticDir = "./public"

[Cache]
listMinutes = 240            # how long to cache list info (not the tweets, so keep it high)
rssMinutes = 10              # how long to cache rss queries
redisHost = "nitter-redis"   # the bundled redis service in docker-compose.yml
redisPort = 6379
redisPassword = ""
redisConnections = 20
redisMaxConnections = 30

[Config]
hmacKey = "9db3c96330972af0693fa8c3736fbe5f086e96f3e8c8791bfbffbda200645b39"  # random; signs media urls
base64Media = false
enableRSS = true             # master switch for RSS feeds (paper-watch reads /<handle>/rss)
enableRSSUserTweets = true
enableRSSUserReplies = true
enableRSSUserMedia = true
enableRSSSearch = true
enableRSSList = true
enableDebug = false
proxy = ""
proxyAuth = ""
apiProxy = ""
disableTid = false           # enable this if cookie-based auth is failing
maxConcurrentReqs = 2        # max requests at a time per session to avoid race conditions
maxRetries = 1
retryDelayMs = 150

[Preferences]
theme = "Nitter"
replaceTwitter = "nitter.net"
replaceYouTube = "piped.video"
replaceReddit = "teddit.net"
proxyVideos = true
hlsPlayback = false
infiniteScroll = false
